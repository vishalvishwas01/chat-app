version: "3.9"

services:
  backend:
    build: ./server
    container_name: chat-backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/chat-app
      - DEMO_VAR=vishal_vishwas
    depends_on:
      - mongo

  frontend:
    build: ./client
    container_name: chat-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  mongo:
    image: mongo:6
    container_name: chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: